<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulačka trojčlenky</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1>Kalkulačka trojčlenky</h1>

        <div class="proportion-type-selection">
            <label>
                <input type="radio" name="proportionType" value="direct" checked>
                Přímá úměra
            </label>
            <label>
                <input type="radio" name="proportionType" value="indirect">
                Nepřímá úměra
            </label>
        </div>

        <div class="proportion-scheme">
          <div class="arrow-container direct-arrow active">
                <span class="arrow-icon"></span>
                <span class="arrow-icon"></span>
            </div>
            <div class="arrow-container indirect-arrow">
                <span class="arrow-icon"></span>
                <span class="arrow-icon"></span>
            </div>

            <div class="row">
                <div class="cell">
                    <input type="number" id="inputA1" placeholder="A1">
                </div>
                <div class="cell">
                    <input type="number" id="inputB1" placeholder="B1">
                </div>
            </div>
            <div class="row">
                <div class="cell">
                    <input type="number" id="inputA2" placeholder="A2">
                </div>
                <div class="cell result-cell">
                    <span id="outputX">X</span>
                </div>
            </div>
        </div>

        <button id="calculateBtn">Vypočítat</button>
        
        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
